<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Squitty Settings</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { overflow: hidden; padding: 0; }
        #settings-container { height: calc(100vh - 60px); overflow-y: auto; padding: 24px; box-sizing: border-box; }
        .footer { margin-top: 0; height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 24px; box-sizing: border-box; background: #fff; }
    </style>
</head>
<body>
    <div id="settings-container">
        <h1>🐭 Squitty Settings</h1>
        <div id="settings-list"></div>
    </div>

    <div class="footer">
        <span>Squitty v1.1.1</span>
        <a href="#" id="open-credits">About Squitty</a>
    </div>

    <script src="settings-renderer.js"></script>
</body>
</html>
